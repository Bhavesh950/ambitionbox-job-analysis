<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}AmbitionBox{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav px-4"> 
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
            <span style="font-size: 18px; margin-right: 8px;">🔍</span>
            AmbitionBox
        </a>

        <div class="ms-auto">
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <!-- <a href="/results" class="btn btn-outline-light me-2">Results</a>-->
            <!-- <a href="/visuals" class="btn btn-outline-light">Visuals</a>-->
            <button onclick="toggleDark()" class="btn btn-light ms-3">🌙</button>
        </div>
        
    </nav>

    <!--MAIN CONTENT -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <!--  FOOTER -->
    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p class="mb-0"> AmbitionBox Project | Built by Bhavesh Mulchandani</p>
    </footer>

<script>
function toggleDark() {
    document.body.classList.toggle("dark-mode");

    // Save state
    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// Apply theme on page load
window.onload = function () {
    let theme = localStorage.getItem("theme");

    if (theme === "dark") {
        document.body.classList.add("dark-mode");
    }
};
</script>

</body>
</html>
